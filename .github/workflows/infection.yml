name: Mutation Testing

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - v*
  schedule:
    - cron: '17 14 * * 1'  # Run mutation tests every Monday at 14:17 UTC

permissions:
  contents: read

jobs:
  infection:
    name: Infection on PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        if: matrix.ext-pqcrypto
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # nightly
        with:
          toolchain: nightly
          components: rustfmt

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1  # 2.36.0
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, sodium
          coverage: pcov

      - name: Build and install ext-pqcrypto
        shell: bash
        run: |
          git clone --depth 1 https://github.com/paragonie/ext-pqcrypto.git "$RUNNER_TEMP/ext-pqcrypto"
          cd "$RUNNER_TEMP/ext-pqcrypto"
          cargo build --release
          EXT_DIR="$(php -r "echo ini_get('extension_dir');")"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/release/pqcrypto.dll "$EXT_DIR/pqcrypto.dll"
          else
            sudo cp target/release/libpqcrypto.so "$EXT_DIR/pqcrypto.so"
          fi
          echo "extension=pqcrypto" >> "$(php -r "echo php_ini_loaded_file();")"
          php -m | grep pqcrypto


      - name: Install dependencies
        uses: ramsey/composer-install@3cf229dc2919194e9e36783941438d17239e8520  # v3.1.1

      - name: Add Infection as dependency
        run: composer require --dev infection/infection

      - name: Update dependencies
        run: composer update

      - name: Mutation Tests
        run: vendor/bin/infection --test-framework-options="--exclude-group=network"

      - name: Print mutation log
        if: always()
        run: cat infection.log || echo "No infection.log found"
